<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="description" content="Freedom Boat Club NEFL weekly dock schedule for Jacksonville and St. Augustine locations." />
  <meta name="robots" content="noindex, nofollow" />
  <meta property="og:title" content="FBC NEFL Schedule" />
  <meta property="og:description" content="Weekly dock schedule for Freedom Boat Club Northeast Florida." />
  <meta property="og:type" content="website" />
  <link rel="icon" href="/fbc-logo.png?v=1" type="image/png" />
  <script>
    (function () {
      var sw = window.innerWidth || document.documentElement.clientWidth || 0;
      if (sw > 0 && sw < 900) {
        var targetWidth = 1100;
        var scale = sw / targetWidth;
        var meta = document.querySelector('meta[name="viewport"]');
        meta.setAttribute(
          'content',
          'width=' + targetWidth +
          ', initial-scale=' + scale +
          ', minimum-scale=' + scale +
          ', maximum-scale=' + scale +
          ', user-scalable=no'
        );
      }
    })();
  </script>
  <title>Freedom Boat Club NEFL Schedule</title>
  <link rel="stylesheet" href="/styles.css?v=126" />
</head>
<body>
  <a href="#main-body" class="skip-nav">Skip to main content</a>
  <div id="app">
    <section id="view-main" class="view">
      <header class="topbar" role="banner">
        <div class="brand">
          <img src="/fbc-logo.png?v=1" alt="Freedom Boat Club" class="brand-logo" width="44" height="44" onerror="this.remove()" />
          <h1 class="brand-title">Freedom Boat Club NEFL Schedule</h1>
        </div>
        <div id="user-chip" class="user-chip"></div>
      </header>

      <main id="main-body">
        <div class="loading-placeholder">Loading schedule...</div>
      </main>
    </section>
  </div>

  <div id="modal-root"></div>

  <script src="/app.js?v=126" defer></script>
</body>
</html>
