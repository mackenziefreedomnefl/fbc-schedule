<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=0.3, maximum-scale=5, user-scalable=yes" />
  <script>
    // On narrow phones, force a wider virtual viewport so the entire schedule
    // grid fits on the screen at once (auto-scaled down by the browser).
    // Without this, iOS Safari will only render at device width and staff
    // would have to pinch-zoom out every time they open the page.
    (function () {
      var sw = window.innerWidth || document.documentElement.clientWidth || 0;
      if (sw > 0 && sw < 900) {
        var targetWidth = 1100;
        var scale = sw / targetWidth;
        var meta = document.querySelector('meta[name="viewport"]');
        meta.setAttribute(
          'content',
          'width=' + targetWidth +
          ', initial-scale=' + scale +
          ', minimum-scale=' + scale +
          ', maximum-scale=5, user-scalable=yes'
        );
      }
    })();
  </script>
  <title>Freedom Boat Club NEFL Schedule</title>
  <link rel="stylesheet" href="/styles.css?v=27" />
</head>
<body>
  <div id="app">
    <section id="view-main" class="view">
      <header class="topbar">
        <div class="brand">
          <img src="/fbc-logo.svg?v=1" alt="FBC" class="brand-logo" onerror="this.remove()" />
          <span>Freedom Boat Club NEFL Schedule</span>
        </div>
        <div id="user-chip" class="user-chip"></div>
      </header>

      <main id="main-body"></main>
    </section>
  </div>

  <div id="modal-root"></div>

  <script src="/app.js?v=27"></script>
</body>
</html>
