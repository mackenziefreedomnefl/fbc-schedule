<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Schedule Dashboard</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="app">
    <!-- Login view -->
    <section id="view-login" class="view hidden">
      <div class="login-card">
        <h1>Schedule Dashboard</h1>
        <p class="muted">Sign in to continue</p>
        <form id="login-form">
          <label>Email <input type="email" name="email" required autocomplete="email" /></label>
          <label>Password <input type="password" name="password" required autocomplete="current-password" /></label>
          <button type="submit" class="primary">Sign in</button>
          <div id="login-error" class="error"></div>
        </form>
      </div>
    </section>

    <!-- Main app -->
    <section id="view-main" class="view hidden">
      <header class="topbar">
        <div class="brand">Schedule Dashboard</div>
        <nav id="tabs" class="tabs"></nav>
        <div class="user-chip">
          <span id="user-email" class="muted"></span>
          <button id="btn-password" class="ghost">Change password</button>
          <button id="btn-logout" class="ghost">Log out</button>
        </div>
      </header>

      <main id="main-body"></main>
    </section>
  </div>

  <!-- Modal root -->
  <div id="modal-root"></div>

  <script src="/app.js"></script>
</body>
</html>
